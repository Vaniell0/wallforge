<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wallforge</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Wallforge</h1>
    <div class="controls">
      <input type="search" id="filter" placeholder="Filter by title or tag…" autocomplete="off">
      <select id="type-filter">
        <option value="">all types</option>
        <option value="image">image</option>
        <option value="video">video</option>
        <option value="scene">scene</option>
        <option value="web">web</option>
      </select>
      <select id="source-filter">
        <option value="all">all sources</option>
        <option value="workshop">workshop</option>
        <option value="library">library</option>
      </select>
      <button id="reload-btn" type="button">Reload</button>
    </div>
    <div id="status" class="status"></div>
    <div id="power" class="power" hidden>
      <div class="power-info">
        <span class="badge" id="power-ac">ac</span>
        <span class="badge" id="power-profile">profile</span>
        <span class="badge" id="power-state" hidden></span>
      </div>
      <div class="power-controls">
        <button type="button" id="power-pause">Pause</button>
        <button type="button" id="power-resume">Resume</button>
      </div>
    </div>
  </header>
  <main>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" hidden>
      <p>Nothing to show yet.</p>
      <p>Subscribe to Wallpaper Engine items in Steam (app <code>431960</code>) or drop files into a directory listed under <code>library.roots</code> in <code>~/.config/wallforge/config.json</code>, then hit Reload.</p>
    </div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
